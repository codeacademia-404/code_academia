<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeAcademia – Try It Editor</title>
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

<!-- ════════════════════════════
     TOP BAR
════════════════════════════ -->
<div class="topbar">
  <a class="logo" href="index.html">
    <div class="logo-icon">&#123;&#125;</div>
    CodeAcademia
  </a>

  <div class="topbar-divider"></div>
  <span class="topbar-title">Try It Editor</span>
  <span class="topbar-sub">— HTML / CSS / JavaScript</span>

  <div class="topbar-actions">

    <!-- Format -->
    <button class="btn btn-ghost" onclick="formatCode()" title="Auto-format code">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 10H7M21 6H3M21 14H3M21 18H7"/>
      </svg>
      Format
    </button>

    <!-- Console toggle -->
    <button class="btn btn-ghost" id="consoleToggleBtn" onclick="toggleConsole()" title="Toggle console">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
      Console
    </button>

    <!-- Fullscreen -->
    <button class="btn btn-icon" onclick="toggleFullscreen('preview')" title="Preview fullscreen">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
      </svg>
    </button>

    <!-- Share -->
    <button class="btn btn-ghost" onclick="shareCode()" title="Copy share link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
      </svg>
      Share
    </button>

    <!-- Reset -->
    <button class="btn btn-ghost" onclick="resetAll()" title="Reset all code">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
      </svg>
      Reset
    </button>

    <!-- RUN -->
    <button class="btn btn-run" onclick="runCode()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M5 3l14 9-14 9V3z"/>
      </svg>
      Run ▶
    </button>
  </div>
</div>

<!-- ════════════════════════════
     EDITOR LAYOUT
════════════════════════════ -->
<div class="editor-layout" id="editorLayout">

  <!-- ── LEFT: CODE SIDE ── -->
  <div class="code-side" id="codeSide">

    <!-- Tabs -->
    <div class="editor-tabs">
      <button class="tab-btn active" id="tab-html" onclick="switchTab('html')">
        <span class="tab-dot html"></span> HTML
      </button>
      <button class="tab-btn" id="tab-css" onclick="switchTab('css')">
        <span class="tab-dot css"></span> CSS
      </button>
      <button class="tab-btn" id="tab-js" onclick="switchTab('js')">
        <span class="tab-dot js"></span> JS
      </button>

      <div class="tab-actions">
        <button class="tab-action-btn" onclick="increaseFontSize()" title="Increase font size">A+</button>
        <button class="tab-action-btn" onclick="decreaseFontSize()" title="Decrease font size">A-</button>
        <button class="tab-action-btn" onclick="copyCurrentTab()" title="Copy code">⎘</button>
      </div>
    </div>

    <!-- ── HTML PANE ── -->
    <div class="editor-pane-wrap active" id="pane-html">
      <div class="line-numbers" id="ln-html"></div>
      <textarea class="code-editor" id="editor-html" spellcheck="false"
        oninput="onEditorInput('html')"
        onkeydown="handleKeyDown(event, 'html')"
        onscroll="syncScroll('html')"
      ></textarea>
    </div>

    <!-- ── CSS PANE ── -->
    <div class="editor-pane-wrap" id="pane-css">
      <div class="line-numbers" id="ln-css"></div>
      <textarea class="code-editor" id="editor-css" spellcheck="false"
        oninput="onEditorInput('css')"
        onkeydown="handleKeyDown(event, 'css')"
        onscroll="syncScroll('css')"
      ></textarea>
    </div>

    <!-- ── JS PANE ── -->
    <div class="editor-pane-wrap" id="pane-js">
      <div class="line-numbers" id="ln-js"></div>
      <textarea class="code-editor" id="editor-js" spellcheck="false"
        oninput="onEditorInput('js')"
        onkeydown="handleKeyDown(event, 'js')"
        onscroll="syncScroll('js')"
      ></textarea>
    </div>

    <!-- Status Bar -->
    <div class="editor-status">
      <span id="status-cursor">Ln 1, Col 1</span>
      <span id="status-chars">0 chars</span>
      <span id="status-lang">HTML</span>
      <span id="status-msg" class="status-ok">Ready</span>
    </div>

    <!-- Console -->
    <div class="console-panel" id="consolePanel">
      <div class="console-header">
        <span class="console-title">Console</span>
        <span id="consoleCount" style="font-size:11px;color:var(--muted);"></span>
        <button class="console-clear" onclick="clearConsole()">Clear</button>
      </div>
      <div class="console-output" id="consoleOutput">
        <div class="console-empty">Console output will appear here.</div>
      </div>
    </div>

  </div><!-- /code-side -->

  <!-- ── RESIZE HANDLE ── -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- ── RIGHT: PREVIEW SIDE ── -->
  <div class="preview-side" id="previewSide">

    <div class="preview-tabs">
      <span class="preview-label">Preview</span>
      <div class="preview-url">
        <div class="preview-url-dot"></div>
        CodeAcademia://preview
      </div>
      <button class="btn btn-icon" onclick="reloadPreview()" title="Reload preview" style="margin-left:4px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="btn btn-icon" onclick="toggleFullscreen('preview')" title="Fullscreen preview">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
        </svg>
      </button>
    </div>

    <div class="preview-content">
      <iframe id="livePreview" title="Live Preview" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="preview-loading" id="previewLoading">
        <div class="spinner"></div>
      </div>
    </div>

  </div><!-- /preview-side -->

</div><!-- /editor-layout -->

<!-- Bottom Status Bar -->
<div class="bottombar">
  <span>🟢 CodeAcademia Editor</span>
  <span id="bb-lang">HTML · CSS · JS</span>
  <div class="bb-right">
    <span>Tab = 2 spaces</span>
    <span id="bb-time"></span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ════════════════════════════
     JAVASCRIPT
════════════════════════════ -->
<script>
/* ─────────────────────────────
   DEFAULT CODE
───────────────────────────── */
const DEFAULTS = {
  html: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
</head>
<body>

  <header>
    <h1>Hello, World! 👋</h1>
    <p>Edit any tab above and click <strong>Run ▶</strong></p>
  </header>

  <section class="card-grid">
    <div class="card">🌐 HTML</div>
    <div class="card">🎨 CSS</div>
    <div class="card">⚡ JavaScript</div>
  </section>

  <button onclick="greet()">Click me!</button>

</body>
</html>`,

  css: `* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f1117;
  color: #e2e4f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 28px;
  padding: 32px;
}

header {
  text-align: center;
}

h1 {
  font-size: 36px;
  background: linear-gradient(90deg, #6c63ff, #00d9a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

p { color: #8890b0; font-size: 15px; }
p strong { color: #00d9a0; }

.card-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #1a1d27;
  border: 1px solid #2e3250;
  border-radius: 12px;
  padding: 24px 32px;
  font-size: 18px;
  font-weight: 600;
  cursor: default;
  transition: transform .2s, border-color .2s;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #6c63ff;
}

button {
  background: #6c63ff;
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .2s;
}

button:hover {
  background: #7c74ff;
  transform: translateY(-2px);
}`,

  js: `function greet() {
  const messages = [
    "Hello from JavaScript! 👋",
    "You clicked the button! 🎉",
    "Keep learning, you're doing great! 🚀",
    "HTML + CSS + JS = Web magic ✨",
  ];
  const msg = messages[Math.floor(Math.random() * messages.length)];

  // Create a floating toast
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = \`
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #232639; border: 1px solid #6c63ff;
    color: #e2e4f0; padding: 12px 24px;
    border-radius: 10px; font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    z-index: 999; animation: fadeIn .3s ease;
  \`;
  document.body.appendChild(toast);

  // Also log to console
  console.log('Button clicked:', msg);

  setTimeout(() => toast.remove(), 2500);
}

// Log something on load
console.info('JavaScript loaded successfully ✅');
console.log('Try editing me in the JS tab!');`
};

/* ─────────────────────────────
   STATE
───────────────────────────── */
let currentTab   = 'html';
let fontSize     = 13;
let autoRunTimer = null;
let consoleOpen  = false;
let consoleItems = [];

/* ─────────────────────────────
   INIT
───────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  // Restore or use defaults
  ['html','css','js'].forEach(lang => {
    const saved = sessionStorage.getItem('code_' + lang);
    document.getElementById('editor-' + lang).value = saved || DEFAULTS[lang];
    updateLineNumbers(lang);
  });

  runCode();
  updateClock();
  setInterval(updateClock, 1000);

  // Drag-to-resize
  initResizer();

  // Update status on cursor move
  ['html','css','js'].forEach(lang => {
    const ta = document.getElementById('editor-' + lang);
    ta.addEventListener('click',   () => updateCursorStatus(lang));
    ta.addEventListener('keyup',   () => updateCursorStatus(lang));
  });
});

/* ─────────────────────────────
   TAB SWITCHING
───────────────────────────── */
function switchTab(lang) {
  currentTab = lang;
  ['html','css','js'].forEach(l => {
    document.getElementById('tab-'  + l).classList.toggle('active', l === lang);
    document.getElementById('pane-' + l).classList.toggle('active', l === lang);
  });
  document.getElementById('status-lang').textContent = lang.toUpperCase();
  document.getElementById('bb-lang').textContent = lang.toUpperCase() + ' editor';
  updateCursorStatus(lang);
  document.getElementById('editor-' + lang).focus();
}

/* ─────────────────────────────
   LINE NUMBERS
───────────────────────────── */
function updateLineNumbers(lang) {
  const ta   = document.getElementById('editor-' + lang);
  const ln   = document.getElementById('ln-' + lang);
  const lines = ta.value.split('\n').length;
  ln.innerHTML = Array.from({length: lines}, (_, i) =>
    `<span>${i + 1}</span>`
  ).join('');
}

function syncScroll(lang) {
  const ta = document.getElementById('editor-' + lang);
  const ln = document.getElementById('ln-' + lang);
  ln.scrollTop = ta.scrollTop;
}

/* ─────────────────────────────
   EDITOR INPUT
───────────────────────────── */
function onEditorInput(lang) {
  updateLineNumbers(lang);
  updateCursorStatus(lang);

  const val = document.getElementById('editor-' + lang).value;
  document.getElementById('status-chars').textContent =
    val.length.toLocaleString() + ' chars';

  sessionStorage.setItem('code_' + lang, val);

  // Debounced auto-run (1 second after stop typing)
  clearTimeout(autoRunTimer);
  autoRunTimer = setTimeout(() => runCode(true), 1000);
}

/* ─────────────────────────────
   CURSOR STATUS
───────────────────────────── */
function updateCursorStatus(lang) {
  const ta   = document.getElementById('editor-' + lang);
  const text = ta.value.substring(0, ta.selectionStart);
  const lines = text.split('\n');
  const ln    = lines.length;
  const col   = lines[lines.length - 1].length + 1;
  document.getElementById('status-cursor').textContent = `Ln ${ln}, Col ${col}`;
}

/* ─────────────────────────────
   KEY BINDINGS
───────────────────────────── */
function handleKeyDown(e, lang) {
  const ta = document.getElementById('editor-' + lang);

  // Tab → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onEditorInput(lang);
    return;
  }

  // Ctrl/Cmd + Enter → run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
    return;
  }

  // Ctrl/Cmd + S → run
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    runCode();
    showToast('✅ Saved & ran');
    return;
  }

  // Auto-close brackets / quotes
  const pairs = { '(':')', '{':'}', '[':']', '"':'"', "'":"'", '`':'`' };
  if (pairs[e.key]) {
    e.preventDefault();
    const s = ta.selectionStart;
    const sel = ta.value.substring(s, ta.selectionEnd);
    const ins = e.key + (sel || '') + pairs[e.key];
    ta.value = ta.value.substring(0, s) + ins + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 1;
    onEditorInput(lang);
    return;
  }

  // Enter → auto-indent
  if (e.key === 'Enter') {
    e.preventDefault();
    const s = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
    const lineText  = ta.value.substring(lineStart, s);
    const indent    = lineText.match(/^(\s*)/)[1];
    const extra     = /[{(\[]$/.test(lineText.trimEnd()) ? '  ' : '';
    const ins = '\n' + indent + extra;
    ta.value = ta.value.substring(0, s) + ins + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + ins.length;
    onEditorInput(lang);
    return;
  }

  // Backspace on double bracket
  if (e.key === 'Backspace') {
    const s = ta.selectionStart;
    if (ta.selectionStart === ta.selectionEnd) {
      const before = ta.value[s - 1];
      const after  = ta.value[s];
      const closes = { '(':')', '{':'}', '[':']', '"':'"', "'":"'", '`':'`' };
      if (closes[before] && closes[before] === after) {
        e.preventDefault();
        ta.value = ta.value.substring(0, s - 1) + ta.value.substring(s + 1);
        ta.selectionStart = ta.selectionEnd = s - 1;
        onEditorInput(lang);
        return;
      }
    }
  }
}

/* ─────────────────────────────
   RUN CODE
───────────────────────────── */
function runCode(silent = false) {
  const html = document.getElementById('editor-html').value;
  const css  = document.getElementById('editor-css').value;
  const js   = document.getElementById('editor-js').value;

  // Show loading briefly
  const loading = document.getElementById('previewLoading');
  loading.classList.add('show');

  // Build full document
  const fullHTML = injectAssets(html, css, js);

  const iframe = document.getElementById('livePreview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  // Intercept console
  const consoleProxy = buildConsoleProxy();

  doc.open();
  doc.write(fullHTML);
  doc.close();

  // Inject console proxy after write
  try {
    const iwin = iframe.contentWindow;
    const origLog   = iwin.console.log.bind(iwin.console);
    const origError = iwin.console.error.bind(iwin.console);
    const origWarn  = iwin.console.warn.bind(iwin.console);
    const origInfo  = iwin.console.info.bind(iwin.console);

    iwin.console.log   = (...a) => { addConsoleEntry('log',   a); origLog(...a);   };
    iwin.console.error = (...a) => { addConsoleEntry('error', a); origError(...a); };
    iwin.console.warn  = (...a) => { addConsoleEntry('warn',  a); origWarn(...a);  };
    iwin.console.info  = (...a) => { addConsoleEntry('info',  a); origInfo(...a);  };

    iwin.onerror = (msg, src, line, col) => {
      addConsoleEntry('error', [`${msg} (line ${line})`]);
      document.getElementById('status-msg').textContent = `Error: line ${line}`;
      document.getElementById('status-msg').className = 'status-err';
    };
  } catch(e) {}

  setTimeout(() => {
    loading.classList.remove('show');
    if (!silent) {
      document.getElementById('status-msg').textContent = 'Ran at ' + new Date().toLocaleTimeString();
      document.getElementById('status-msg').className = 'status-ok';
    }
  }, 200);
}

function injectAssets(html, css, js) {
  const styleTag = `<style>${css}</style>`;
  const scriptTag = `<script>
    // Wrap in try/catch for better error reporting
    try { ${js} } catch(e) { console.error(e.message); }
  <\/script>`;

  if (/<\/head>/i.test(html)) {
    html = html.replace(/<\/head>/i, `${styleTag}\n</head>`);
  } else {
    html = styleTag + html;
  }

  if (/<\/body>/i.test(html)) {
    html = html.replace(/<\/body>/i, `${scriptTag}\n</body>`);
  } else {
    html = html + scriptTag;
  }

  return html;
}

/* ─────────────────────────────
   CONSOLE
───────────────────────────── */
function buildConsoleProxy() {}

function addConsoleEntry(type, args) {
  consoleItems.push({ type, text: args.map(a => {
    if (typeof a === 'object') {
      try { return JSON.stringify(a, null, 2); } catch { return String(a); }
    }
    return String(a);
  }).join(' ') });

  renderConsole();

  // Auto-open console on error
  if (type === 'error' && !consoleOpen) toggleConsole();
}

function renderConsole() {
  const out = document.getElementById('consoleOutput');
  const count = document.getElementById('consoleCount');

  if (consoleItems.length === 0) {
    out.innerHTML = '<div class="console-empty">Console output will appear here.</div>';
    count.textContent = '';
    return;
  }

  const icons = { log: '›', error: '✖', warn: '⚠', info: 'ℹ' };
  out.innerHTML = consoleItems.map(item =>
    `<div class="console-line ${item.type}">
      <span class="con-icon">${icons[item.type] || '›'}</span>
      <span>${escapeHtml(item.text)}</span>
    </div>`
  ).join('');

  count.textContent = `(${consoleItems.length})`;
  out.scrollTop = out.scrollHeight;
}

function clearConsole() {
  consoleItems = [];
  renderConsole();
}

function toggleConsole() {
  consoleOpen = !consoleOpen;
  document.getElementById('consolePanel').classList.toggle('open', consoleOpen);
  document.getElementById('consoleToggleBtn').style.color =
    consoleOpen ? 'var(--accent2)' : '';
}

/* ─────────────────────────────
   FORMAT
───────────────────────────── */
function formatCode() {
  const ta = document.getElementById('editor-' + currentTab);
  let code = ta.value;

  if (currentTab === 'html') {
    code = formatHTML(code);
  } else if (currentTab === 'css') {
    code = formatCSS(code);
  } else {
    code = formatJS(code);
  }

  ta.value = code;
  sessionStorage.setItem('code_' + currentTab, code);
  updateLineNumbers(currentTab);
  showToast('✨ Code formatted');
}

function formatHTML(code) {
  let indent = 0;
  const lines = code.split('\n').map(l => l.trim()).filter(l => l);
  return lines.map(line => {
    const isClose = /^<\//.test(line);
    const isSelf  = /\/>$/.test(line) || /^<(meta|link|img|br|hr|input)/.test(line);
    const isDoctype = /^<!/.test(line);

    if (isClose) indent = Math.max(0, indent - 1);
    const out = (isDoctype ? '' : '  '.repeat(indent)) + line;
    if (!isClose && !isSelf && /^<[^/!]/.test(line)) indent++;
    return out;
  }).join('\n');
}

function formatCSS(code) {
  return code
    .replace(/\s*{\s*/g, ' {\n  ')
    .replace(/;\s*/g, ';\n  ')
    .replace(/\s*}\s*/g, '\n}\n')
    .replace(/  \n}/g, '\n}')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function formatJS(code) {
  // Basic: normalize spacing around operators and semicolons
  return code
    .replace(/;(?!\n)/g, ';\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

/* ─────────────────────────────
   FONT SIZE
───────────────────────────── */
function increaseFontSize() {
  fontSize = Math.min(20, fontSize + 1);
  applyFontSize();
}

function decreaseFontSize() {
  fontSize = Math.max(10, fontSize - 1);
  applyFontSize();
}

function applyFontSize() {
  document.querySelectorAll('.code-editor').forEach(el => {
    el.style.fontSize = fontSize + 'px';
    el.style.lineHeight = (fontSize * 1.6) + 'px';
  });
  document.querySelectorAll('.line-numbers span').forEach(el => {
    el.style.lineHeight = (fontSize * 1.6) + 'px';
  });
  ['html','css','js'].forEach(updateLineNumbers);
  showToast('Font size: ' + fontSize + 'px');
}

/* ─────────────────────────────
   COPY / SHARE / RESET
───────────────────────────── */
function copyCurrentTab() {
  const code = document.getElementById('editor-' + currentTab).value;
  navigator.clipboard.writeText(code).then(() => showToast('⎘ Copied!'));
}

function shareCode() {
  const data = {
    html: document.getElementById('editor-html').value,
    css:  document.getElementById('editor-css').value,
    js:   document.getElementById('editor-js').value,
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url = location.href.split('?')[0] + '?code=' + encoded;
  navigator.clipboard.writeText(url).then(() =>
    showToast('🔗 Share link copied!')
  );
}

function resetAll() {
  if (!confirm('Reset all code to defaults?')) return;
  ['html','css','js'].forEach(lang => {
    document.getElementById('editor-' + lang).value = DEFAULTS[lang];
    sessionStorage.removeItem('code_' + lang);
    updateLineNumbers(lang);
  });
  runCode();
  showToast('↺ Reset to defaults');
}

function reloadPreview() {
  runCode();
}

/* ─────────────────────────────
   FULLSCREEN
───────────────────────────── */
function toggleFullscreen(which) {
  if (which === 'preview') {
    const on = document.body.classList.toggle('fullscreen-preview');
    showToast(on ? '⛶ Preview fullscreen (click again to exit)' : 'Exited fullscreen');
  }
}

/* ─────────────────────────────
   DRAG RESIZE
───────────────────────────── */
function initResizer() {
  const handle  = document.getElementById('resizeHandle');
  const left    = document.getElementById('codeSide');
  const layout  = document.getElementById('editorLayout');
  let dragging  = false;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = layout.getBoundingClientRect();
    const pct  = Math.min(80, Math.max(20, ((e.clientX - rect.left) / rect.width) * 100));
    left.style.width = pct + '%';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ─────────────────────────────
   CLOCK
───────────────────────────── */
function updateClock() {
  document.getElementById('bb-time').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

/* ─────────────────────────────
   TOAST
───────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─────────────────────────────
   UTILS
───────────────────────────── */
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ─────────────────────────────
   LOAD FROM URL ?code=...
───────────────────────────── */
(function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (!code) return;
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(code))));
    ['html','css','js'].forEach(lang => {
      if (data[lang]) document.getElementById('editor-' + lang).value = data[lang];
    });
    showToast('📎 Code loaded from link');
  } catch(e) {}
})();

/* ─────────────────────────────
   KEYBOARD SHORTCUT LEGEND
───────────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    showToast('Shortcuts: Ctrl+Enter=Run · Ctrl+S=Save · Tab=Indent');
  }
});
</script>
